<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 420" width="740" height="420"
     font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1 L9 5 L0 9 z" fill="#555"/>
    </marker>
    <marker id="ap" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1 L9 5 L0 9 z" fill="#5b4fcf"/>
    </marker>
  </defs>

  <rect width="740" height="420" fill="#f7f9fa" rx="6"/>
  <text x="370" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#1c2833">SensitiveDoc Classification — How It Flows</text>
  <text x="370" y="44" text-anchor="middle" font-size="11" fill="#7f8c8d">SensitiveDoc is an EDB fact — it can come from any source and is joined with IsToolResult at authorization time</text>

  <!-- ══ LEFT: Current (mock) ══ -->
  <rect x="20" y="58" width="330" height="270" rx="8" fill="#f0eeff" stroke="#5b4fcf" stroke-width="1.5"/>
  <text x="185" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a3db0">Current  (policy-as-code)</text>

  <!-- policy file box -->
  <rect x="40" y="92" width="290" height="66" rx="6" fill="white" stroke="#5b4fcf" stroke-width="1"/>
  <text x="185" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a3db0">policies/compensation_access.dl</text>
  <text x="55" y="130" font-size="10" fill="#2c3e50" font-family="monospace">SensitiveDoc(compensation_strategy).</text>
  <text x="55" y="146" font-size="10" fill="#2c3e50" font-family="monospace">SensitiveDoc(board_presentation).</text>

  <line x1="185" y1="158" x2="185" y2="184" stroke="#5b4fcf" stroke-width="1.5" marker-end="url(#ap)"/>
  <text x="197" y="176" font-size="9" fill="#7f8c8d">parse_rules()</text>

  <!-- Datalog engine box -->
  <rect x="40" y="188" width="290" height="50" rx="6" fill="white" stroke="#5b4fcf" stroke-width="1"/>
  <text x="185" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a3db0">DatalogEngine</text>
  <text x="185" y="228" text-anchor="middle" font-size="10" fill="#555">SensitiveDoc facts loaded as EDB</text>

  <!-- pros/cons -->
  <rect x="40" y="252" width="290" height="64" rx="5" fill="rgba(91,79,207,0.07)"/>
  <text x="52" y="270" font-size="10" fill="#27ae60" font-weight="bold">✓</text>
  <text x="62" y="270" font-size="10" fill="#2c3e50">Version-controlled, auditable, deterministic</text>
  <text x="52" y="286" font-size="10" fill="#27ae60" font-weight="bold">✓</text>
  <text x="62" y="286" font-size="10" fill="#2c3e50">No runtime dependencies</text>
  <text x="52" y="302" font-size="10" fill="#c0392b" font-weight="bold">✗</text>
  <text x="62" y="302" font-size="10" fill="#2c3e50">Manual update required for each new</text>
  <text x="62" y="316" font-size="10" fill="#2c3e50">sensitive document</text>

  <!-- ══ RIGHT: Production ══ -->
  <rect x="390" y="58" width="330" height="270" rx="8" fill="#fef5e7" stroke="#e67e22" stroke-width="1.5"/>
  <text x="555" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#784212">Production  (Drive Labels API)</text>

  <!-- Drive Labels box -->
  <rect x="410" y="92" width="290" height="66" rx="6" fill="white" stroke="#e67e22" stroke-width="1"/>
  <text x="555" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#784212">Google Drive Labels API</text>
  <text x="425" y="130" font-size="10" fill="#2c3e50">files.get(fields="labelInfo")</text>
  <text x="425" y="146" font-size="10" fill="#2c3e50">label: { sensitivity: "vp-only" }</text>

  <line x1="555" y1="158" x2="555" y2="184" stroke="#e67e22" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="567" y="176" font-size="9" fill="#7f8c8d">inject at auth time</text>

  <!-- Dynamic EDB box -->
  <rect x="410" y="188" width="290" height="50" rx="6" fill="white" stroke="#e67e22" stroke-width="1"/>
  <text x="555" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#784212">DatalogEngine</text>
  <text x="555" y="228" text-anchor="middle" font-size="10" fill="#555">SensitiveDoc(doc_id) injected dynamically</text>

  <!-- pros/cons -->
  <rect x="410" y="252" width="290" height="64" rx="5" fill="rgba(230,126,34,0.07)"/>
  <text x="422" y="270" font-size="10" fill="#27ae60" font-weight="bold">✓</text>
  <text x="432" y="270" font-size="10" fill="#2c3e50">Classify in Drive UI — policy updates instantly</text>
  <text x="422" y="286" font-size="10" fill="#27ae60" font-weight="bold">✓</text>
  <text x="432" y="286" font-size="10" fill="#2c3e50">.dl file contains only rules — no doc IDs</text>
  <text x="422" y="302" font-size="10" fill="#c0392b" font-weight="bold">✗</text>
  <text x="432" y="302" font-size="10" fill="#2c3e50">Requires Drive API call at authorization time</text>

  <!-- ══ BOTTOM: Taint JOIN ══ -->
  <rect x="20" y="342" width="700" height="64" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="370" y="362" text-anchor="middle" font-size="11" font-weight="bold" fill="#7d6608">How taint fires — the JOIN in Datalog</text>
  <text x="60" y="382" font-size="11" fill="#2c3e50" font-family="monospace">Tainted(Node) :- IsToolResult(Node, read_document, Doc),  SensitiveDoc(Doc).</text>
  <text x="60" y="398" font-size="11" fill="#7f8c8d" font-family="monospace">          ↑ dynamic (from graph)                          ↑ static OR dynamic</text>

  <!-- VS label -->
  <rect x="352" y="178" width="36" height="24" rx="12" fill="white" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="370" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#7f8c8d">VS</text>
</svg>
