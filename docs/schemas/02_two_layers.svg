<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 460" width="740" height="460"
     font-family="Arial, Helvetica, sans-serif">

  <rect width="740" height="460" fill="#f7f9fa" rx="6"/>
  <text x="370" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1c2833">Two Enforcement Layers</text>
  <text x="370" y="46" text-anchor="middle" font-size="11" fill="#7f8c8d">Drive IAM and PCAS are complementary — they enforce at different points in the stack</text>

  <!-- ══ LEFT: Drive IAM ══ -->
  <rect x="24" y="60" width="330" height="310" rx="10" fill="#fef5e7" stroke="#e67e22" stroke-width="2"/>
  <rect x="24" y="60" width="330" height="44" rx="10" fill="#e67e22"/>
  <rect x="24" y="90" width="330" height="14" fill="#e67e22"/>
  <text x="189" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Google Drive IAM  ("Share with")</text>
  <text x="189" y="116" text-anchor="middle" font-size="11" fill="#784212">Storage-level access gate</text>

  <!-- Drive controls -->
  <text x="44" y="140" font-size="11" font-weight="bold" fill="#6e2f04">✓  Controls</text>
  <rect x="38" y="148" width="300" height="72" rx="5" fill="rgba(230,126,34,0.1)"/>
  <text x="50" y="166" font-size="11" fill="#6e2f04">• read_document(doc_id)</text>
  <text x="50" y="182" font-size="11" fill="#6e2f04">• list_documents()</text>
  <text x="50" y="198" font-size="11" fill="#6e2f04">• Any direct Drive API file operation</text>
  <text x="50" y="214" font-size="11" fill="#6e2f04">• Applied at the Drive API boundary</text>

  <!-- Drive cannot -->
  <text x="44" y="240" font-size="11" font-weight="bold" fill="#c0392b">✗  Cannot enforce</text>
  <rect x="38" y="248" width="300" height="108" rx="5" fill="rgba(192,57,43,0.07)"/>
  <text x="50" y="266" font-size="11" fill="#c0392b">• send_email( to, body )</text>
  <text x="50" y="282" font-size="11" fill="#c0392b">• post_slack / write_to_external_api</text>
  <text x="50" y="298" font-size="11" fill="#c0392b">• Any non-Drive tool call</text>
  <text x="50" y="316" font-size="11" fill="#c0392b">• What the LLM does with data once</text>
  <text x="62" y="332" font-size="11" fill="#c0392b">it is in the context window</text>
  <text x="50" y="348" font-size="11" fill="#c0392b">• Indirect leakage via shared sessions</text>

  <!-- ══ RIGHT: PCAS ══ -->
  <rect x="386" y="60" width="330" height="310" rx="10" fill="#f0eeff" stroke="#5b4fcf" stroke-width="2"/>
  <rect x="386" y="60" width="330" height="44" rx="10" fill="#5b4fcf"/>
  <rect x="386" y="90" width="330" height="14" fill="#5b4fcf"/>
  <text x="551" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="white">PCAS Reference Monitor</text>
  <text x="551" y="116" text-anchor="middle" font-size="11" fill="#4a3db0">Information-flow control layer</text>

  <!-- PCAS controls -->
  <text x="406" y="140" font-size="11" font-weight="bold" fill="#2e1a8e">✓  Controls</text>
  <rect x="400" y="148" width="300" height="72" rx="5" fill="rgba(91,79,207,0.1)"/>
  <text x="412" y="166" font-size="11" fill="#2e1a8e">• Every tool call, regardless of type</text>
  <text x="412" y="182" font-size="11" fill="#2e1a8e">• send_email, post_slack, read_document</text>
  <text x="412" y="198" font-size="11" fill="#2e1a8e">• Actions depending on tainted context</text>
  <text x="412" y="214" font-size="11" fill="#2e1a8e">• Cross-principal session inheritance</text>

  <!-- PCAS mechanism -->
  <text x="406" y="240" font-size="11" font-weight="bold" fill="#2e1a8e">⚙  Mechanism</text>
  <rect x="400" y="248" width="300" height="108" rx="5" fill="rgba(91,79,207,0.07)"/>
  <text x="412" y="266" font-size="11" fill="#2e1a8e">• Causal dependency graph (DAG)</text>
  <text x="412" y="282" font-size="11" fill="#2e1a8e">• backward_slice(context_node_ids)</text>
  <text x="412" y="298" font-size="11" fill="#2e1a8e">• Taint propagation through graph</text>
  <text x="412" y="314" font-size="11" fill="#2e1a8e">• Datalog policy rules (stratified)</text>
  <text x="412" y="330" font-size="11" fill="#2e1a8e">• Fail-closed (default deny)</text>
  <text x="412" y="346" font-size="11" fill="#2e1a8e">• Deny overrides Allow</text>

  <!-- ══ BOTTOM: Together ══ -->
  <rect x="24" y="384" width="692" height="62" rx="8" fill="#eaf2ff" stroke="#2980b9" stroke-width="1.5"/>
  <text x="370" y="406" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5276">Together: Bell-LaPadula Multilevel Security (MLS)</text>
  <text x="370" y="424" text-anchor="middle" font-size="11" fill="#2980b9">Drive IAM enforces  no-read-up  (Bob cannot open Alice's files)</text>
  <text x="370" y="440" text-anchor="middle" font-size="11" fill="#2980b9">PCAS enforces  no-write-down  (Bob cannot leak data Alice read into the session)</text>

  <!-- VS label -->
  <rect x="346" y="178" width="48" height="28" rx="14" fill="white" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="370" y="197" text-anchor="middle" font-size="12" font-weight="bold" fill="#7f8c8d">VS</text>
</svg>
